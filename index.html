  const err = document.getElementById("err");
  err.textContent = "復号中…";
  try {
    const pw = new TextEncoder().encode(document.getElementById("pw").value);
    const keyMat = await crypto.subtle.importKey("raw", pw, "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iterations, hash:"SHA-256" },
      keyMat, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(PAYLOAD.nonce) }, key, b64(PAYLOAD.ct));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch (ex) {
    err.textContent = "パスワードが違います";
  }
});
</script>
</body>
</html>
